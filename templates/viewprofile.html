    </div>































    
<script>
let username = "{{ username }}";

function getInitials(name) {
    let words = name.trim().split(" ");
    let initials = words[0][0];
    if (words.length > 1) {
        initials += words[1][0];
    }
    return initials.toUpperCase();
}

function getColor(name) {
    let colors = ["#FF5733", "#33FF57", "#3357FF", "#FF33A8", "#FF8C00"];
    let index = name.length % colors.length;
    return colors[index];
}

function generateAvatar() {
    let canvas = document.getElementById("avatarCanvas");
    let canva = document.getElementById("canva");

    let ctx = canvas.getContext("2d");
    let ct = canva.getContext("2d");

    let initials = getInitials(username);

    
    ctx.fillStyle = getColor(username);
    ctx.beginPath();
    ctx.arc(20, 20, 20, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "white";
    ctx.font = "bold 18px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(initials, 20, 22);

    
    let size = canva.width; 

    ct.fillStyle = getColor(username);
    ct.beginPath();
    ct.arc(size/2, size/2, size/2, 0, Math.PI * 2);
    ct.fill();

    ct.fillStyle = "white";
    ct.font = "bold " + (size/2.5) + "px Arial";
    ct.textAlign = "center";
    ct.textBaseline = "middle";
    ct.fillText(initials, size/2, size/2);
}

generateAvatar();
</script>
